<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task3</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <main>
        <section>
            <header>
                <div class="heading">
                    <h1>Explore Art Work</h1>
                    <p>See All</p>
                </div>
            </header>
        </section>
        <section>
            <div class="firstbox">
                <div class="box">
                    <img src="monocular.png" alt="">
                    <div class="cardtext">
                        <p>Monucular</p>
                        <p>54.8k <i class="ri-poker-hearts-line"></i> </p>
                    </div>
                    <button class="btn">Place Bid</button>
                </div>
                 <div class="box">
                    <img src="horns_mask.png" alt="">

                        <p>Horns Mask</p>
                        <p>32.4k <i class="ri-poker-hearts-line"></i> </p>
                    </div>
                    <button class="btn">Place Bid</button>
                </div>
                 <div class="box">
                    <img src="light_moon.png" alt="">
                    <div class="cardtext">
                        <p>Light Moon</p>
                        <p>86.8k <i class="ri-poker-hearts-line"></i> </p>
                    </div>
                    <button class="btn">Place Bid</button>
                </div>
                 <div class="box">
                    <img src="skull_wire.png" alt="">

                        <p>Skull Wire</p>
                        <p>78.9k <i class="ri-poker-hearts-line"></i> </p>
                    </div>
                    <button class="btn">Place Bid</button>
                </div>

            </div>
        </section>
        <section>
            <div class="secondbox">

                    <img src="spiderman.png" alt="">

                    </div>
                    <button class="btn">Place Bid</button>
                </div>
                 <div class="box">
                    <img src="deadpool.png" alt="">
                    <div class="cardtext">
                        <p>Dead Pool</p>
                        <p>59.8k <i class="ri-poker-hearts-line"></i> </p>
                    </div>
                    <button class="btn">Place Bid</button>
                </div>
                 <div class="box">
                    <img src="white_eye.png" alt="">
                    <div class="cardtext">
                        <p>White Eye</p>
                        <p>45.7k <i class="ri-poker-hearts-line"></i> </p>
                    </div>
                    <button class="btn">Place Bid</button>
                </div>
                 <div class="box">
                    <img src="plastic_spinal.png" alt="">
                    <div class="cardtext">
                        <p>Plastic Spinal</p>

                    </div>
                    <button class="btn">Place Bid</button>

            </div>
